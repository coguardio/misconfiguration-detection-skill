name: Check CoGuard Version

on:
  schedule:
    # Run weekly on Mondays at 9 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:  # Allow manual triggers
  pull_request:
    paths:
      - '**.md'
      - 'skill.json'

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Get latest CoGuard version
        id: latest_version
        run: |
          LATEST=$(pip index versions coguard-cli 2>/dev/null | \
            grep -oP 'Available versions: \K[0-9]+\.[0-9]+\.[0-9]+' | \
            head -1)
          echo "version=$LATEST" >> $GITHUB_OUTPUT
          echo "Latest CoGuard version: $LATEST"

      - name: Check version in codebase
        run: |
          LATEST="${{ steps.latest_version.outputs.version }}"
          echo "Checking for version $LATEST in codebase..."

          # Search for version in all files
          if ! grep -r "$LATEST" --include="*.md" --include="*.json" .; then
            echo "::error::Latest CoGuard version $LATEST not found in codebase!"
            echo "Please update documentation to reference the latest version."
            exit 1
          fi

          echo "✓ Latest version $LATEST found in codebase"

      - name: Comment on PR (if applicable)
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⚠️ The codebase does not reference the latest CoGuard version. ' +
                    'Please update documentation with version ${{ steps.latest_version.outputs.version }}'
            })
