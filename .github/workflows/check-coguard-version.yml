name: Check CoGuard Version

on:
  schedule:
    # Run weekly on Mondays at 9 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:  # Allow manual triggers

permissions:
  contents: read
  issues: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Get latest CoGuard version
        id: latest_version
        run: |
          LATEST=$(pip index versions coguard-cli 2>/dev/null | \
            grep -oP 'Available versions: \K[0-9]+\.[0-9]+\.[0-9]+' | \
            head -1)
          echo "version=$LATEST" >> $GITHUB_OUTPUT
          echo "Latest CoGuard version: $LATEST"

      - name: Create issue if new version detected
        uses: actions/github-script@v7
        with:
          script: |
            const latest = '${{ steps.latest_version.outputs.version }}';
            if (!latest) {
              console.log('Could not determine latest version, skipping.');
              return;
            }

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'version-update',
              state: 'open'
            });

            const existing = issues.data.find(i => i.title.includes(latest));
            if (!existing) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `CoGuard CLI ${latest} released — review docs`,
                body: `A new version of coguard-cli (\`${latest}\`) is available on PyPI.\n\nReview documentation and examples for accuracy.`,
                labels: ['version-update']
              });
              console.log(`Created issue for version ${latest}`);
            } else {
              console.log(`Issue already exists for version ${latest}`);
            }
