# ============================================================================
# PostgreSQL Hardened Configuration
# Generated to address CoGuard security scan findings on postgres:latest
# ============================================================================

# ---------------------------------------------------------------------------
# Connection Settings
# ---------------------------------------------------------------------------
listen_addresses = 'localhost'
port = 5433                          # Non-standard port (CG: postgres_do_not_use_standard_port)

# ---------------------------------------------------------------------------
# SSL / Encryption (CG: postgres_enable_ssl_traffic)
# ---------------------------------------------------------------------------
ssl = on
ssl_cert_file = '/var/lib/postgresql/server.crt'
ssl_key_file = '/var/lib/postgresql/server.key'

# ---------------------------------------------------------------------------
# Write-Ahead Log & Archiving (CG: postgres_enable_archive_mode)
# ---------------------------------------------------------------------------
wal_level = replica
archive_mode = on
archive_command = 'test ! -f /var/lib/postgresql/archive/%f && cp %p /var/lib/postgresql/archive/%f'

# ---------------------------------------------------------------------------
# Logging - Connections & Sessions
# ---------------------------------------------------------------------------
log_connections = on                 # CG: postgres_enable_logging_connections
log_disconnections = on              # CG: postgres_enable_logging_disconnections

# ---------------------------------------------------------------------------
# Logging - Statements & Auditing
# ---------------------------------------------------------------------------
log_statement = 'ddl'                # CG: postgres_log_statement_not_none

# ---------------------------------------------------------------------------
# Logging - Directory, Rotation & Timezone
# ---------------------------------------------------------------------------
logging_collector = on
log_directory = '/var/log/postgresql' # CG: postgres_ensure_log_directory_is_set
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_rotation_size = 100MB            # CG: postgres_ensure_log_rotation_size_not_disabled
log_rotation_age = 1d
log_timezone = 'UTC'                 # CG: postgres_log_timezone_utc
